/* =====================================================
   VARIABLES
===================================================== */

let currentQuestion = 0;
let score = 0;
let timer;
let timeLeft = 25;

/* =====================================================
   LOAD QUESTION
===================================================== */

function loadQuestion() {

    clearInterval(timer);

    const q = quizQuestions[currentQuestion];

    document.querySelector(".question").textContent =
        q.question;

    const optionTexts =
        document.querySelectorAll(".option-text");

    const optionInputs =
        document.querySelectorAll("input[name='option']");

    optionTexts.forEach((text, index) => {

        text.textContent = q.options[index];

        optionInputs[index].checked = false;

        optionInputs[index].value = index;

    });

    document.getElementById("progress").textContent =
        `Question ${currentQuestion + 1} of ${quizQuestions.length}`;

    startTimer();
}

/* =====================================================
   TIMER
===================================================== */

function startTimer() {

    timeLeft = 25;

    const timerElement =
        document.getElementById("timer");

    timerElement.textContent =
        `Time Left : ${timeLeft}s`;

    timer = setInterval(() => {

        timeLeft--;

        timerElement.textContent =
            `Time Left : ${timeLeft}s`;

        if (timeLeft <= 0) {

            clearInterval(timer);
            nextQuestion();

        }

    }, 1000);
}

/* =====================================================
   SUBMIT ANSWER
===================================================== */

function submitAnswer() {

    const selectedOption =
        document.querySelector(
            "input[name='option']:checked"
        );

    if (!selectedOption) {

        alert("Please select an option!");
        return;

    }

    const selectedAnswer =
        Number(selectedOption.value);

    if (
        selectedAnswer ===
        quizQuestions[currentQuestion].answer
    ) {

        score++;

    }

    nextQuestion();
}

/* =====================================================
   NEXT QUESTION
===================================================== */

function nextQuestion() {

    clearInterval(timer);

    currentQuestion++;

    if (currentQuestion < quizQuestions.length) {

        loadQuestion();

    } else {

        showResult();

    }
}

/* =====================================================
   SHOW RESULT
===================================================== */

function showResult() {

    document.getElementById("quiz").style.display = "none";

    document.getElementById("timer").style.display = "none";

    document.getElementById("progress").style.display = "none";

    const percentage =
        Math.round(
            (score / quizQuestions.length) * 100
        );

    document.getElementById("result").innerHTML = `
        <h2>🎉 Quiz Completed</h2>
        <br>
        <h3>Score: ${score} / ${quizQuestions.length}</h3>
        <h3>Percentage: ${percentage}%</h3>
        <br>
        <button onclick="location.reload()">
            Restart Quiz
        </button>
    `;
}
